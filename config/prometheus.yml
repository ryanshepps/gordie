global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'fantasy-agent'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # - "alerts.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'fantasy-agent'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'
