apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        tags: ['agent_name', 'tool_name', 'user_email']
        filterByTraceID: true
        filterBySpanID: true
      nodeGraph:
        enabled: true
      serviceMap:
        datasourceUid: prometheus

  - name: Infinity
    uid: infinity
    type: yesoreyeram-infinity-datasource
    access: proxy
    editable: true
    jsonData:
      httpHeaderName1: X-Admin-Key
    secureJsonData:
      httpHeaderValue1: ${ADMIN_API_KEY}
