# Cloudflare Tunnel config template.
# Copy to `cloudflare-tunnel-config.yml`, then fill in your tunnel UUID and hostname.
# Create a tunnel with: `cloudflared tunnel create <name>`
# The UUID and credentials JSON are emitted on creation.

tunnel: REPLACE_WITH_TUNNEL_UUID
credentials-file: ./.cloudflared/REPLACE_WITH_TUNNEL_UUID.json

ingress:
  # Backend API on a single-level subdomain. Cloudflare Universal SSL (free)
  # covers `*.your-domain.tld` but NOT two-level `api.sub.your-domain.tld`,
  # so use a flat name like `yourapp-api.your-domain.tld`.
  # Apex/root domain points to Cloudflare Pages (set as custom domain there).
  - hostname: yourapp-api.example.com
    service: http://localhost:8000
  - service: http_status:404  # catch-all (required)
