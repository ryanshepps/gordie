server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: oauth
    static_configs:
      - targets:
          - localhost
        labels:
          job: fantasy-agent
          component: oauth
          log_type: application
          __path__: /app/oauth.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            filename: filename
            message: message
      - labels:
          level:
          filename:
      - timestamp:
          source: timestamp
          format: RFC3339

  - job_name: oauth-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: fantasy-agent
          component: oauth
          log_type: error
          __path__: /app/oauth-error.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            filename: filename
            message: message
            exception: exception
      - labels:
          level:
          filename:
      - timestamp:
          source: timestamp
          format: RFC3339

  - job_name: tunnel
    static_configs:
      - targets:
          - localhost
        labels:
          job: fantasy-agent
          component: tunnel
          log_type: application
          __path__: /app/tunnel.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339

  - job_name: tunnel-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: fantasy-agent
          component: tunnel
          log_type: error
          __path__: /app/tunnel-error.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            exception: exception
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339

  - job_name: agent
    static_configs:
      - targets:
          - localhost
        labels:
          job: fantasy-agent
          component: agent
          log_type: application
          __path__: /app/agent.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            filename: filename
            message: message
            agent_name: agent_name
            tool_name: tool_name
            user_email: user_email
      - labels:
          level:
          filename:
          agent_name:
          tool_name:
      - timestamp:
          source: timestamp
          format: RFC3339
